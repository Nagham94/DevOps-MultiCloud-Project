# ansible/roles/argocd/tasks/main.yml
---

# ── Verify EKS connection ─────────────────────────────────────
- name: Verify kubectl is connected to EKS
  command: kubectl cluster-info
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  register: cluster_info
  changed_when: false

- name: Print cluster info
  debug:
    msg: "{{ cluster_info.stdout_lines }}"

# ── ArgoCD namespace ──────────────────────────────────────────
- name: Check if argocd namespace exists
  shell: |
    kubectl get namespace {{ argocd_namespace }} \
      --no-headers 2>/dev/null | wc -l
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  register: argocd_ns_check
  changed_when: false

- name: Create argocd namespace
  command: kubectl create namespace {{ argocd_namespace }}
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  when: argocd_ns_check.stdout == "0"

- name: Skip namespace creation if already exists
  debug:
    msg: "argocd namespace already exists — skipping"
  when: argocd_ns_check.stdout != "0"

# ── Install ArgoCD ────────────────────────────────────────────
- name: Check if ArgoCD is already installed
  shell: |
    kubectl get deployment argocd-server \
      -n {{ argocd_namespace }} \
      --no-headers 2>/dev/null | wc -l
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  register: argocd_check
  changed_when: false

- name: Install ArgoCD
  shell: |
    kubectl apply \
      --server-side \
      --force-conflicts \
      -n {{ argocd_namespace }} \
      -f https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  when: argocd_check.stdout == "0"

- name: Skip ArgoCD install if already installed
  debug:
    msg: "ArgoCD already installed — skipping"
  when: argocd_check.stdout != "0"

# ── Wait for ArgoCD pods ──────────────────────────────────────
- name: Wait for argocd-server deployment to be available
  shell: |
    kubectl wait deployment argocd-server \
      --namespace {{ argocd_namespace }} \
      --for=condition=available \
      --timeout=300s
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Wait for all ArgoCD pods to be ready
  shell: |
    kubectl wait pod \
      --namespace {{ argocd_namespace }} \
      --for=condition=ready \
      --all \
      --timeout=300s
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Verify all ArgoCD pods are running
  shell: kubectl get pods -n {{ argocd_namespace }}
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  register: argocd_pods
  changed_when: false

- name: Print ArgoCD pods
  debug:
    msg: "{{ argocd_pods.stdout_lines }}"

# ── Get ArgoCD initial password ───────────────────────────────
- name: Wait for initial admin secret to be created
  shell: |
    kubectl get secret argocd-initial-admin-secret \
      -n {{ argocd_namespace }} \
      --no-headers 2>/dev/null | wc -l
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  register: secret_check
  retries: 10
  delay: 15
  until: secret_check.stdout != "0"
  changed_when: false

- name: Get ArgoCD initial admin password
  shell: |
    kubectl -n {{ argocd_namespace }} \
      get secret argocd-initial-admin-secret \
      -o jsonpath="{.data.password}" | base64 -d
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  register: argocd_password
  changed_when: false

# ── Save password to vault ────────────────────────────────────
- name: Save ArgoCD password to file for reference
  copy:
    content: "{{ argocd_password.stdout }}"
    dest: /home/ubuntu/.argocd_password
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  become: yes

# ── Print access instructions ─────────────────────────────────
- name: Print ArgoCD access instructions
  debug:
    msg: |
        ArgoCD installed successfully on EKS                

# ── Install ArgoCD CLI ────────────────────────────────────────
- name: Check if ArgoCD CLI already installed
  command: argocd version --client
  register: argocd_cli_check
  changed_when: false
  failed_when: false

- name: Download ArgoCD CLI
  get_url:
    url: "https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64"
    dest: /tmp/argocd
    mode: "0755"
  when: argocd_cli_check.rc != 0

- name: Install ArgoCD CLI
  copy:
    src: /tmp/argocd
    dest: /usr/local/bin/argocd
    mode: "0755"
    remote_src: yes
  become: yes
  when: argocd_cli_check.rc != 0

- name: Verify ArgoCD CLI
  command: argocd version --client
  register: argocd_cli_ver
  changed_when: false

- name: Print ArgoCD CLI version
  debug:
    msg: "{{ argocd_cli_ver.stdout }}"

# ── Apply ArgoCD Application manifests ───────────────────────
- name: Check if portfolio-aws application exists
  shell: |
    kubectl get application portfolio-aws \
      -n {{ argocd_namespace }} \
      --no-headers 2>/dev/null | wc -l
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  register: argocd_app_check
  changed_when: false

- name: Apply ArgoCD portfolio-aws application
  shell: |
    kubectl apply \
      -f /home/ubuntu/devops-multicloud-project/kubernetes/argocd/portfolio-aws.yaml
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  when: argocd_app_check.stdout == "0"
  failed_when: false

- name: Verify ArgoCD application status
  shell: kubectl get application -n {{ argocd_namespace }}
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    KUBECONFIG: /home/ubuntu/.kube/config
  register: argocd_apps
  changed_when: false
  failed_when: false

- name: Print ArgoCD applications
  debug:
    msg: "{{ argocd_apps.stdout_lines }}"