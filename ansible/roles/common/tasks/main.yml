- name: Update apt cache
  apt:
    update_cache: yes
    # to avoid updating cache on every run
    cache_valid_time: 3600
  become: yes

- name: Upgrade all packages
  apt:
    upgrade: dist
  become: yes

- name: Install basic tools
  apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
  become: yes

- name: Set timezone to UTC
  timezone:
    name: UTC
  become: yes

# disabling password authentication
# ensures that only SSH key-based authentication is allowed
- name: Disable password authentication in SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  become: yes
  notify: restart sshd

- name: Set up UFW firewall — deny all inbound by default
  ufw:
    state: enabled
    policy: deny
    direction: incoming
  become: yes

- name: Allow all outbound
  ufw:
    rule: allow
    direction: out
  become: yes

- name: Allow traffic from Azure VNet only
  ufw:
    rule: allow
    src: "10.0.0.0/8"
  become: yes