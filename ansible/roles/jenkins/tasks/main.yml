---
# ── Pre-cleanup: Remove broken repos before ANY apt call ─────
- name: Remove any broken Jenkins repo files from previous runs
  file:
    path: "{{ item }}"
    state: absent
  become: yes
  loop:
    - /etc/apt/sources.list.d/jenkins.list
    - /etc/apt/sources.list.d/jenkins_io_debian_stable.list

- name: Remove stale Jenkins keyring from previous runs
  file:
    path: /etc/apt/keyrings/jenkins.gpg
    state: absent
  become: yes

- name: Clean apt cache to reset state
  shell: apt-get clean && rm -rf /var/lib/apt/lists/*
  become: yes
  args:
    executable: /bin/bash

- name: Run apt-get update fresh after cleanup
  shell: apt-get update 2>&1
  register: initial_apt_update
  become: yes
  changed_when: false
  failed_when: initial_apt_update.rc != 0

# ── Java ─────────────────────────────────────────────────────
- name: Install Java 21
  apt:
    name: openjdk-21-jdk
    state: present
    update_cache: yes
  become: yes

- name: Verify Java version
  command: java -version
  register: java_version
  changed_when: false

- name: Print Java version
  debug:
    msg: "{{ java_version.stderr }}"

# Install Node.js and npm (simple apt install; replace with NodeSource if you need newer versions)
- name: Install Node.js and npm
  apt:
    name:
      - nodejs
      - npm
    state: present
    update_cache: yes
  become: yes

# Install trivy (idempotent: only installs when binary missing)
- name: Install Trivy
  shell: |
    if ! command -v trivy &> /dev/null; then
      curl -sfL \
        https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
        | sh -s -- -b /usr/local/bin
    fi
  args:
    executable: /bin/bash
  become: yes

- name: Include EFS mounting tasks
  include_tasks: efs-mount.yml
  when: efs_dns_name is defined

# ── Jenkins GPG Key ───────────────────────────────────────────
- name: Install gnupg and curl
  apt:
    name:
      - gnupg
      - curl
    state: present
  become: yes

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
    owner: root
    group: root
  become: yes

- name: Remove stale Jenkins keyring if present
  file:
    path: /etc/apt/keyrings/jenkins.gpg
    state: absent
  become: yes

- name: Create temp GPG home directory
  file:
    path: /tmp/jenkins-gpg-tmp
    state: directory
    mode: "0700"
    owner: root
    group: root
  become: yes

- name: Import Jenkins GPG key from keyserver
  shell: |
    gpg --batch --yes \
        --keyserver hkps://keyserver.ubuntu.com \
        --recv-keys 7198F4B714ABFC68
  become: yes
  args:
    executable: /bin/bash
  environment:
    GNUPGHOME: /tmp/jenkins-gpg-tmp
  register: gpg_import
  retries: 3
  delay: 5
  until: gpg_import.rc == 0

- name: Export Jenkins key to apt keyring
  shell: |
    gpg --batch --yes \
        --export 7198F4B714ABFC68 \
        > /etc/apt/keyrings/jenkins.gpg
  become: yes
  args:
    executable: /bin/bash
  environment:
    GNUPGHOME: /tmp/jenkins-gpg-tmp

- name: Set keyring permissions
  file:
    path: /etc/apt/keyrings/jenkins.gpg
    owner: root
    group: root
    mode: "0644"
  become: yes

- name: Verify the keyring contains the correct key ID
  shell: gpg --show-keys /etc/apt/keyrings/jenkins.gpg 2>&1
  register: keyring_check
  changed_when: false
  become: yes

- name: Print key IDs found in keyring
  debug:
    msg: "{{ keyring_check.stdout_lines }}"

- name: Fail if correct key ID is not in keyring
  fail:
    msg: "Key 7198F4B714ABFC68 not found in keyring! Got: {{ keyring_check.stdout }}"
  when: "'7198F4B714ABFC68' not in keyring_check.stdout | upper"

- name: Clean up temp GPG directory
  file:
    path: /tmp/jenkins-gpg-tmp
    state: absent
  become: yes

# ── Jenkins Repository ────────────────────────────────────────
- name: Remove any existing broken Jenkins repo file
  file:
    path: "{{ item }}"
    state: absent
  become: yes
  loop:
    - /etc/apt/sources.list.d/jenkins.list
    - /etc/apt/sources.list.d/jenkins_io_debian_stable.list

- name: Add Jenkins apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins.gpg] https://pkg.jenkins.io/debian-stable binary/"
    filename: jenkins
    state: present
    update_cache: no
  become: yes

- name: Update apt cache
  shell: apt-get update 2>&1
  register: apt_update_result
  changed_when: false
  become: yes
  failed_when: >
    apt_update_result.rc != 0 and
    'jenkins' in apt_update_result.stdout

- name: Show apt update result
  debug:
    msg: "{{ apt_update_result.stdout_lines }}"

# ── Jenkins Install ───────────────────────────────────────────
- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: yes
  become: yes

# ── Java override for Jenkins systemd service ─────────────────
- name: Create Jenkins systemd override directory
  file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory
    mode: "0755"
  become: yes

- name: Write Jenkins systemd override to use Java 21
  copy:
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    content: |
      [Service]
      Environment="JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"
      Environment="PATH=/usr/lib/jvm/java-21-openjdk-amd64/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    mode: "0644"
  become: yes

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
  become: yes

# ── Jenkins Admin User Setup ──────────────────────────────────
- name: Stop Jenkins if already running
  systemd:
    name: jenkins
    state: stopped
  become: yes
  ignore_errors: yes

- name: Ensure Jenkins init.groovy.d directory exists
  file:
    path: /var/lib/jenkins/init.groovy.d
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"
  become: yes

- name: Create Jenkins admin user via Groovy init script
  copy:
    dest: /var/lib/jenkins/init.groovy.d/basic-security.groovy
    owner: jenkins
    group: jenkins
    mode: "0640"
    content: |
      import jenkins.model.*
      import hudson.security.*

      def instance = Jenkins.get()
      def hudsonRealm = new HudsonPrivateSecurityRealm(false)

      hudsonRealm.createAccount(
          "{{ jenkins_admin_user }}",
          "{{ jenkins_admin_password }}"
      )

      instance.setSecurityRealm(hudsonRealm)

      def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
      strategy.setAllowAnonymousRead(false)
      instance.setAuthorizationStrategy(strategy)
      instance.save()
  become: yes
  #no_log: true

# ── Enable and Start Jenkins ──────────────────────────────────
- name: Enable and start Jenkins
  systemd:
    name: jenkins
    enabled: yes
    state: started
    daemon_reload: yes
  become: yes

- name: Wait for Jenkins to start on port 8080
  wait_for:
    port: 8080
    delay: 15
    timeout: 120

- name: Confirm Jenkins is running
  systemd:
    name: jenkins
  register: jenkins_status
  changed_when: false
  become: yes

- name: Print Jenkins service status
  debug:
    msg: "Jenkins is {{ jenkins_status.status.ActiveState }}"

# ── Post Install ──────────────────────────────────────────────
- name: Add jenkins user to docker group
  user:
    name: jenkins
    groups: docker
    append: yes
  become: yes

- name: Restart Jenkins for docker group to take effect
  systemd:
    name: jenkins
    state: restarted
  become: yes

- name: Create Jenkins workspace directory
  file:
    path: /var/lib/jenkins/workspace
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0755"
  become: yes

- name: Print Jenkins setup complete message
  debug:
    msg: "Jenkins is ready. Login at http://{{ inventory_hostname }}:8080 with user: {{ jenkins_admin_user }}"