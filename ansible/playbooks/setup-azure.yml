---
- name: Configure Azure Jenkins/AKS DR stack
  hosts: jenkins
  gather_facts: yes
  become: yes
  vars:
    argocd_manifest: portfolio-azure.yaml
    argocd_application_name: portfolio-azure

  pre_tasks:
    - name: Verify we can connect
      ping:

    - name: Print OS information
      debug:
        msg: >
          Configuring {{ inventory_hostname }}
          running {{ ansible_distribution }}
          {{ ansible_distribution_version }}

  roles:
    - role: common      
    - role: docker      
    - role: jenkins     
    - role: kubectl     
    - role: argocd      

  post_tasks:
    - name: Verify services are running
      systemd:
        name: "{{ item }}"
      register: service_status
      loop:
        - jenkins
        - docker
      changed_when: false

    - name: Print final status
      debug:
        msg: |
          ✓ Azure VM configuration complete
          ✓ Jenkins running on port 8080
          ✓ Docker installed
          ✓ kubectl installed
          ✓ Helm installed
          ✓ Azure CLI installed
          ✓ ArgoCD installed and configured

  handlers:
    - name: restart sshd
      systemd:
        name: sshd
        state: restarted
