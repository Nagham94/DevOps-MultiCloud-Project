[ec2]
# localhost is used as a placeholder, the actual hosts will be dynamically discovered by Ansible's EC2 plugin
aws-ec2 ansible_host=127.0.0.1

[ec2:vars]
ansible_user=ubuntu
ansible_port=2222
ansible_ssh_private_key_file=ansible/aws_ec2.pem
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'